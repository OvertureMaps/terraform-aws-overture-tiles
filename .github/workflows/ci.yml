name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  # ────────────────────────────────────────────
  # Format check
  # ────────────────────────────────────────────
  fmt:
    name: Format
    runs-on: ubuntu-slim
    concurrency:
      group: fmt-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: "1.9.0"
          tofu_wrapper: false

      - name: tofu fmt
        run: tofu fmt -check -recursive

  # ────────────────────────────────────────────
  # Validate – no provider credentials needed
  # ────────────────────────────────────────────
  validate:
    name: Validate
    runs-on: ubuntu-slim
    concurrency:
      group: validate-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: "1.9.0"
          tofu_wrapper: false

      - name: tofu init (module root)
        run: tofu init -backend=false

      - name: tofu validate
        run: tofu validate

      - name: tofu init (example/complete)
        run: tofu init -backend=false
        working-directory: examples/complete

      - name: tofu validate (example/complete)
        run: tofu validate
        working-directory: examples/complete

  # ────────────────────────────────────────────
  # Unit tests – mocked provider, no AWS creds
  # ────────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-slim
    needs: [fmt, validate]
    concurrency:
      group: test-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: "1.9.0"
          tofu_wrapper: false

      - name: tofu init
        run: tofu init -backend=false

      - name: tofu test
        run: tofu test
        env:
          # No real AWS credentials — mock_provider handles everything.
          TF_CLI_ARGS_test: "-verbose"

  # ────────────────────────────────────────────
  # Lint
  # ────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-slim
    needs: [validate]
    concurrency:
      group: lint-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - uses: opentofu/setup-opentofu@847eaa4afeb791b06daa46e8eafa8b1b68d7cfb4 # v2.0.1
        with:
          tofu_version: "1.9.0"
          tofu_wrapper: false

      - uses: terraform-linters/setup-tflint@b480b8fcdaa6f2c577f8e4fa799e89e756bb7c93 # v6.2.2
        with:
          tflint_version: latest

      - name: tflint init
        run: tflint --init

      - name: tflint
        run: tflint --recursive
